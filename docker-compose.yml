version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: logikamobile-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: logikamobile-backend
    ports:
      - "8086:8080"
    environment:
      - JDBC_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-crm_db}
      - DB_USER=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8086}
    container_name: logikamobile-frontend
    ports:
      - "3034:3000"
    depends_on:
      - backend

volumes:
  pgdata:
